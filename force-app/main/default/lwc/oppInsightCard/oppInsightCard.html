<template>
    <lightning-card title="AI Insight" icon-name="utility:einstein">
        <lightning-button-icon
            slot="actions"
            icon-name="utility:refresh"
            alternative-text="새로고침"
            onclick={handleRefresh}
            disabled={isLoading}>
        </lightning-button-icon>

        <div class="slds-p-around_medium bl-insight-container">
            <template lwc:if={isLoading}>
                <div class="bl-insight-loading">
                    <div class="bl-insight-loading__box">
                        <lightning-spinner alternative-text={labels.aiLoading} size="medium" variant="brand"></lightning-spinner>
                        <p class="bl-insight-loading__text">AI 가 기회 점수와 인사이트 불러오는 중...</p>
                    </div>
                </div>
            </template>

            <template lwc:if={errorMessage}>
                <p class="slds-text-color_destructive">{errorMessage}</p>
            </template>

            <template lwc:if={hasInsight}>
                <!-- 점수 카드 -->
                <div class={scoreCardClass}>
                    <div class="bl-score-row">
                        <span class="bl-score-label">거래 점수</span>
                        <span class="bl-score-value">{scoreText}</span>
                    </div>
                    <div class="bl-score-bar">
                        <div class="bl-score-bar-fill" style={scoreBarStyle}></div>
                    </div>
                    <div class="bl-score-breakdown">
                        <template for:each={scoreBreakdown} for:item="b">
                            <div key={b.key} class="bl-bd-item">
                                <span class="bl-bd-label">{b.label}</span>
                                <span class="bl-bd-value">+{b.value}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- AI 요약 -->
                <div class="bl-summary slds-m-top_medium">
                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
                        <h4 class="slds-text-title_caps">한 줄 요약</h4>
                        <span class={aiBadgeClass}>{aiBadgeLabel}</span>
                    </div>
                    <p class="slds-text-body_regular">{insight.summary}</p>
                </div>

                <!-- 위험 요소 -->
                <template lwc:if={hasRisks}>
                    <div class="bl-section slds-m-top_medium">
                        <h4 class="slds-text-title_caps slds-m-bottom_x-small">위험 요소</h4>
                        <ul class="bl-list">
                            <template for:each={insight.risks} for:item="r">
                                <li key={r}>{r}</li>
                            </template>
                        </ul>
                    </div>
                </template>

                <!-- 추천 액션 -->
                <template lwc:if={hasNextActions}>
                    <div class="bl-section slds-m-top_medium">
                        <h4 class="slds-text-title_caps slds-m-bottom_x-small">✅ 추천 액션</h4>
                        <ol class="bl-list bl-list_ordered">
                            <template for:each={insight.nextActions} for:item="a">
                                <li key={a}>{a}</li>
                            </template>
                        </ol>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
