<template>
    <lightning-card title="견적 빌더" icon-name="standard:quotes">
        <template lwc:if={isLoading}>
            <div class="bl-loading-overlay">
                <div class="bl-loading-box">
                    <lightning-spinner alternative-text={labels.aiLoading} size="medium" variant="brand"></lightning-spinner>
                    <p class="bl-loading-text">{labels.aiLoading}</p>
                </div>
            </div>
        </template>

        <div class="slds-p-around_medium">
            <template lwc:if={hasSummary}>
                <!-- 헤더 -->
                <div class="bl-quote-header slds-grid slds-wrap slds-m-bottom_medium">
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">견적 번호</span>
                        <strong>{header.name}</strong>
                    </div>
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">상태</span>
                        <strong>{header.status}</strong>
                    </div>
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">유효일</span>
                        <strong>
                            <lightning-formatted-date-time value={header.expirationDate}></lightning-formatted-date-time>
                        </strong>
                    </div>
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">고객사</span>
                        <strong>{header.accountName}</strong>
                    </div>
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">기회</span>
                        <strong>{header.opportunityName}</strong>
                    </div>
                    <div class="slds-col slds-size_1-of-3 bl-header-cell">
                        <span class="bl-label">AE 편집수</span>
                        <strong>{header.aeEditCount}</strong>
                    </div>
                </div>

                <!-- FR-AR-003 — AR 상황 헤더 (장기미수/총미수/신용한도) -->
                <template lwc:if={showArHeader}>
                    <div class="bl-ar-header slds-grid slds-wrap slds-m-bottom_medium" data-credit-exceeded={header.creditExceeded}>
                        <div class="slds-col slds-size_1-of-3 bl-ar-cell">
                            <span class="bl-label">총 미수금</span>
                            <strong>
                                <lightning-formatted-number value={header.totalAR} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                            </strong>
                        </div>
                        <div class="slds-col slds-size_1-of-3 bl-ar-cell">
                            <span class="bl-label">신용 한도</span>
                            <strong>
                                <template lwc:if={header.creditLimit}>
                                    <lightning-formatted-number value={header.creditLimit} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                                </template>
                                <template lwc:else>—</template>
                            </strong>
                        </div>
                        <div class="slds-col slds-size_1-of-3 bl-ar-cell">
                            <span class="bl-label">장기 미수</span>
                            <template lwc:if={header.longTermDebtor}>
                                <strong class="slds-text-color_destructive">⚠ 보유</strong>
                            </template>
                            <template lwc:else>
                                <strong class="slds-text-color_success">없음</strong>
                            </template>
                        </div>
                    </div>
                    <template lwc:if={header.creditExceeded}>
                        <div class="bl-ar-warning slds-m-bottom_medium" role="alert">
                            <span class="bl-ar-warning__icon">⚠</span>
                            <strong>신용한도 초과 노출</strong> — 현재 미수금 + 본 견적 합계
                            <lightning-formatted-number value={header.creditUtilization} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                            가 한도
                            <lightning-formatted-number value={header.creditLimit} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                            를 초과합니다. 발송 전 신용 검토 권장.
                        </div>
                    </template>
                </template>

                <!-- 라인 액션 헤더 -->
                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                    <h3 class="slds-text-heading_small">라인</h3>
                    <div>
                        <lightning-button label="새로고침" onclick={handleRefresh} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label="+ 라인 추가" variant="brand" onclick={openAddModal}></lightning-button>
                    </div>
                </div>

                <!-- PDF / 이메일 액션 바 -->
                <div class="bl-actions slds-m-bottom_small">
                    <lightning-button label="PDF 생성" icon-name="utility:download" onclick={handleGeneratePdf} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button label="PDF 미리보기" icon-name="utility:preview" onclick={handlePreviewPdf} disabled={pdfDisabled} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button label="이메일 발송" icon-name="utility:email" variant="brand" onclick={openEmailModal} disabled={pdfDisabled}></lightning-button>
                    <template lwc:if={pdfContentDocumentId}>
                        <span class="slds-m-left_small slds-text-color_success slds-text-body_small">✓ PDF 첨부됨</span>
                    </template>
                </div>

                <!-- 라인 리스트 -->
                <template lwc:if={hasLines}>
                    <template for:each={lines} for:item="ln">
                        <c-quote-line-editor
                            key={ln.id}
                            line={ln}
                            onlinesave={handleLineSave}
                            onlinedelete={handleLineDelete}>
                        </c-quote-line-editor>
                    </template>
                </template>
                <template lwc:else>
                    <div class="bl-empty">
                        라인이 없습니다. "+ 라인 추가" 버튼으로 추가하세요.
                    </div>
                </template>

                <!-- 합계 -->
                <div class="bl-totals slds-m-top_medium">
                    <div class="bl-totals__row">
                        <span>Subtotal</span>
                        <lightning-formatted-number value={totals.subtotal} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                    </div>
                    <div class="bl-totals__row">
                        <span>총 할인</span>
                        <span class="slds-text-color_destructive">
                            -<lightning-formatted-number value={totals.totalDiscount} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                        </span>
                    </div>
                    <div class="bl-totals__row bl-totals__net">
                        <strong>최종 청구 금액</strong>
                        <strong>
                            <lightning-formatted-number value={totals.netTotal} format-style="currency" currency-code="KRW"></lightning-formatted-number>
                        </strong>
                    </div>
                </div>
            </template>
            <template lwc:else>
                <p class="slds-text-color_weak slds-text-align_center slds-m-vertical_medium">견적 정보를 불러오는 중...</p>
            </template>
        </div>

        <!-- 이메일 발송 모달 -->
        <template lwc:if={showEmailModal}>
            <section role="dialog" class="slds-modal slds-modal_large slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">견적서 이메일 발송</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small slds-text-body_small slds-text-color_weak">
                            기본 제목·본문이 채워져 있습니다. 필요 시 수정 후 발송하세요. 첨부된 PDF 견적서가 함께 보내집니다. 발송 후 Quote 상태는 '발송'으로 변경됩니다.
                        </p>
                        <lightning-input
                            type="email"
                            label="수신 이메일"
                            value={toEmail}
                            placeholder="customer@example.com"
                            required
                            class="slds-m-bottom_small"
                            onchange={handleEmailChange}>
                        </lightning-input>
                        <lightning-input
                            type="text"
                            label="제목"
                            value={emailSubject}
                            required
                            class="slds-m-bottom_small"
                            onchange={handleSubjectChange}>
                        </lightning-input>
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="bl-email-body">본문</label>
                            <div class="slds-form-element__control">
                                <textarea id="bl-email-body"
                                    class="slds-textarea bl-email-body-input"
                                    oninput={handleBodyChange}>{emailBody}</textarea>
                            </div>
                            <p class="slds-form-element__help">줄바꿈은 그대로 반영됩니다.</p>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="취소" onclick={closeEmailModal} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label="발송" variant="brand" onclick={handleSendEmail}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- 라인 추가 모달 -->
        <template lwc:if={showAddModal}>
            <section role="dialog" class="slds-modal slds-fade-in-open" aria-modal="true">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">라인 추가</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-combobox
                            label="제품 선택"
                            value={selectedProductId}
                            options={productOptions}
                            onchange={handleProductSelect}
                            placeholder="제품을 선택하세요...">
                        </lightning-combobox>
                        <lightning-input
                            type="number"
                            label="수량"
                            value={addQuantity}
                            step="1"
                            min="1"
                            class="slds-m-top_small"
                            onchange={handleAddQtyChange}>
                        </lightning-input>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="취소" onclick={closeAddModal} class="slds-m-right_x-small"></lightning-button>
                        <lightning-button label="추가" variant="brand" onclick={handleAddLine}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
