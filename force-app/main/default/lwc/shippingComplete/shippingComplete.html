<template>
    <lightning-card title="출고 등록" icon-name="utility:truck">
        <div class="slds-p-around_medium">
            <template lwc:if={errorMessage}>
                <p class="slds-text-color_destructive slds-m-bottom_x-small">{errorMessage}</p>
            </template>

            <div class={cardClass}>
                <div class="bl-head">
                    <div>
                        <div class="bl-label">생산 상태</div>
                        <div class="bl-value">{statusLabel}</div>
                    </div>
                    <template lwc:if={isShipped}>
                        <div class="bl-shipped-meta">
                            <div class="bl-label">출고일</div>
                            <div class="bl-value-sm">{shippedDateDisplay}</div>
                        </div>
                    </template>
                </div>

                <template lwc:if={isDone}>
                    <div class="slds-grid slds-gutters slds-m-top_small">
                        <div class="slds-col">
                            <lightning-input
                                type="date"
                                label="출고일"
                                value={todayIso}
                                onchange={handleDateChange}
                                max={todayIso}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-grow">
                            <lightning-input
                                type="text"
                                label="비고 (선택)"
                                value={note}
                                onchange={handleNoteChange}
                                placeholder="예) 항공편 출고 / 분할 출고 등">
                            </lightning-input>
                        </div>
                    </div>
                    <div class="slds-m-top_small">
                        <lightning-button
                            label="출고 등록"
                            variant="brand"
                            onclick={handleSubmit}
                            disabled={isSubmitting}>
                        </lightning-button>
                    </div>
                </template>

                <template lwc:if={isNotReady}>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                        ※ 생산 상태가 <strong>완료</strong> 일 때 출고 등록이 가능합니다.
                    </p>
                </template>

                <template lwc:if={isShipped}>
                    <p class="slds-text-body_small slds-m-top_x-small">
                        ✅ 이미 출고 완료된 주문입니다.
                    </p>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
