<template>
    <lightning-card title="AE 콕피트" icon-name="standard:home">
        <lightning-button-icon
            slot="actions"
            icon-name="utility:refresh"
            alternative-text="새로고침"
            onclick={handleRefresh}
            disabled={isLoading}>
        </lightning-button-icon>

        <div class="slds-p-around_medium">
            <template lwc:if={isLoading}>
                <div class="slds-align_absolute-center slds-m-vertical_medium">
                    <lightning-spinner alternative-text="로딩 중..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template lwc:if={errorMessage}>
                <p class="slds-text-color_destructive">{errorMessage}</p>
            </template>

            <template lwc:if={hasData}>
                <div class="bl-grid">

                    <!-- 1. 신규 RFQ -->
                    <div class="bl-card bl-card_rfq">
                        <div class="bl-card-head">
                            <h3>신규 RFQ (최근 7일)</h3>
                            <span class="bl-card-count">{rfqRows.length}</span>
                        </div>
                        <template lwc:if={hasRfqs}>
                            <ul class="bl-list">
                                <template for:each={rfqRows} for:item="r">
                                    <li key={r.leadId} class="bl-item" data-id={r.leadId} onclick={handleLeadClick}>
                                        <div class="bl-item-main">
                                            <strong>{r.company}</strong>
                                            <span class="bl-sub">{r.leadName} · {r.channelLabel}</span>
                                        </div>
                                        <div class="bl-item-meta">{r.createdAtText}</div>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="bl-empty">신규 RFQ 없음</p>
                        </template>
                    </div>

                    <!-- 2. 우선 처리 Lead -->
                    <div class="bl-card bl-card_lead">
                        <div class="bl-card-head">
                            <h3>우선 처리 Lead</h3>
                            <span class="bl-card-count">{priorityLeadRows.length}</span>
                        </div>
                        <template lwc:if={hasLeadStatusBreakdown}>
                            <div class="bl-chip-row">
                                <template for:each={leadStatusBreakdown} for:item="c">
                                    <span key={c.key} class="bl-chip">{c.label} {c.count}건</span>
                                </template>
                            </div>
                        </template>
                        <template lwc:if={hasPriorityLeads}>
                            <ul class="bl-list">
                                <template for:each={priorityLeadRows} for:item="r">
                                    <li key={r.leadId} class="bl-item" data-id={r.leadId} onclick={handleLeadClick}>
                                        <div class="bl-item-main">
                                            <strong>{r.company}</strong>
                                            <span class="bl-sub">{r.leadName} · {r.status}</span>
                                        </div>
                                        <span class={r.scoreClass}>{r.leadScore}점</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="bl-empty">우선 Lead 없음</p>
                        </template>
                    </div>

                    <!-- 3. 발송 견적 추적 -->
                    <div class="bl-card bl-card_quote">
                        <div class="bl-card-head">
                            <h3>발송 견적 추적</h3>
                            <span class="bl-card-count">{sentQuoteRows.length}</span>
                        </div>
                        <template lwc:if={hasSentQuotes}>
                            <ul class="bl-list">
                                <template for:each={sentQuoteRows} for:item="r">
                                    <li key={r.quoteId} class="bl-item" data-id={r.quoteId} onclick={handleQuoteClick}>
                                        <div class="bl-item-main">
                                            <strong>{r.quoteName}</strong>
                                            <span class="bl-sub">{r.accountName} · 발송 {r.sentText}</span>
                                        </div>
                                        <span class={r.openedClass}>{r.openedLabel}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="bl-empty">추적 중인 발송 없음</p>
                        </template>
                    </div>

                    <!-- 4. 위험 주문 -->
                    <div class="bl-card bl-card_order">
                        <div class="bl-card-head">
                            <h3>납기 위험 주문</h3>
                            <span class="bl-card-count">{riskyOrderRows.length}</span>
                        </div>
                        <template lwc:if={hasRiskyOrders}>
                            <ul class="bl-list">
                                <template for:each={riskyOrderRows} for:item="r">
                                    <li key={r.orderId} class="bl-item" data-id={r.orderId} onclick={handleOrderClick}>
                                        <div class="bl-item-main">
                                            <strong>{r.poNumber}</strong>
                                            <span class="bl-sub">{r.accountName} · {r.statusLabel}</span>
                                            <template lwc:if={r.dueLabel}>
                                                <span class={r.dueClass}>{r.dueLabel}</span>
                                            </template>
                                        </div>
                                        <span class={r.scoreClass}>{r.riskScore}점</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="bl-empty">위험 주문 없음 — 평온 ✅</p>
                        </template>
                    </div>

                    <!-- 5. 미수금 액션 -->
                    <div class="bl-card bl-card_ar">
                        <div class="bl-card-head">
                            <h3>미수금 액션</h3>
                            <span class="bl-card-count">{arRows.length}</span>
                        </div>
                        <template lwc:if={hasArActions}>
                            <ul class="bl-list">
                                <template for:each={arRows} for:item="r">
                                    <li key={r.accountId} class="bl-item" data-id={r.accountId} onclick={handleAccountClick}>
                                        <div class="bl-item-main">
                                            <strong>{r.accountName}</strong>
                                            <span class="bl-sub">{r.longTermBadge}</span>
                                        </div>
                                        <span class="bl-amount">{r.totalARText}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>
                        <template lwc:else>
                            <p class="bl-empty">미수금 액션 없음</p>
                        </template>
                    </div>

                </div>
            </template>
        </div>
    </lightning-card>
</template>
